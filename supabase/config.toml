# The function directory is "server/" but Figma Make deploys it as "make-server-e07959ec".
# Both entries are listed so this works regardless of which name the CLI resolves.
[functions.server]
verify_jwt = false

[functions.make-server-e07959ec]
verify_jwt = false

# License server — handles its own auth (webhook secret, admin bearer token,
# license-key + fingerprint), so Supabase JWT verification is disabled.
[functions.make-server-license]
verify_jwt = false
